<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flaily — Something is on the way...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      background-color: #009AF3;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 45%, #29b1ff 0%, #009AF3 55%, #0077cc 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', -apple-system, sans-serif;
      overflow: hidden;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.35;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .logo {
      width: min(360px, 72vw);
      height: auto;
      display: block;
      filter: drop-shadow(0 8px 40px rgba(0, 0, 0, 0.18));
    }

    .tagline {
      color: rgba(255, 255, 255, 0.8);
      font-size: 19px;
      font-weight: 400;
      letter-spacing: normal;
    }

    .contact {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 0;
    }

    .contact a {
      color: rgba(255, 255, 255, 0.65);
      font-size: 14px;
      font-weight: 400;
      text-decoration: none;
      transition: color 0.15s;
    }

    .contact a:hover { color: rgba(255, 255, 255, 0.95); }

    .contact span {
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="logo.svg" alt="Flaily">

    <p class="tagline">Something is on the way&hellip;</p>

    <div class="contact">
      <a href="mailto:support@flaily.com">support@flaily.com</a>
      <span>·</span>
      <a href="tel:+59160358075">+591 60358075</a>
    </div>
  </div>
</body>
</html>
